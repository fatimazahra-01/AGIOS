<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scan N Go — Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0f4f8;
  --bg2:#ffffff;
  --bg3:#f7f9fc;
  --bg4:#eef2f7;
  --bg5:#e8edf4;

  --cyan:#0891b2;
  --cyan2:#06b6d4;
  --cyan3:rgba(8,145,178,0.1);
  --cyan4:rgba(8,145,178,0.06);
  --cyan-glow:rgba(6,182,212,0.3);

  --indigo:#4f46e5;
  --indigo2:#6366f1;
  --indigo3:rgba(79,70,229,0.1);
  --indigo-glow:rgba(99,102,241,0.25);

  --violet:#7c3aed;
  --green:#059669;
  --green2:rgba(5,150,105,0.1);
  --amber:#d97706;
  --amber2:rgba(217,119,6,0.1);
  --red:#dc2626;
  --red2:rgba(220,38,38,0.1);

  --txt:#0f172a;
  --txt2:#334155;
  --txt3:#64748b;
  --txt4:#94a3b8;
  --txt5:rgba(15,23,42,0.06);

  --glass:rgba(255,255,255,0.9);
  --glass2:rgba(255,255,255,0.95);
  --border:rgba(79,70,229,0.18);
  --border2:rgba(8,145,178,0.2);
  --border3:rgba(15,23,42,0.1);
  --border4:rgba(15,23,42,0.06);

  --r:14px;--rs:9px;--rxs:5px;
  --ff-display:'Plus Jakarta Sans',sans-serif;
  --ff-body:'Plus Jakarta Sans',sans-serif;
  --ff-mono:'JetBrains Mono',monospace;

  --sh:0 1px 3px rgba(15,23,42,0.08),0 4px 16px rgba(15,23,42,0.06);
  --sh-md:0 2px 8px rgba(15,23,42,0.08),0 8px 24px rgba(15,23,42,0.06);
  --sh-neon-c:0 0 0 1px rgba(8,145,178,0.2),0 4px 20px rgba(6,182,212,0.15),0 0 40px rgba(6,182,212,0.08);
  --sh-neon-i:0 0 0 1px rgba(79,70,229,0.2),0 4px 20px rgba(99,102,241,0.15),0 0 40px rgba(99,102,241,0.08);
}

html,body{height:100%;overflow:hidden}
body{font-family:var(--ff-body);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.65}
#root{height:100vh;overflow:hidden}

/* ── BG ORBS (light, present everywhere) ── */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.55}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.22),transparent 70%);top:-280px;left:-200px;animation:drift1 25s ease-in-out infinite alternate}
.orb2{width:450px;height:450px;background:radial-gradient(circle,rgba(6,182,212,0.2),transparent 70%);bottom:-120px;right:-80px;animation:drift2 20s ease-in-out infinite alternate}
.orb3{width:320px;height:320px;background:radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%);top:40%;left:38%;animation:drift3 30s ease-in-out infinite alternate}
@keyframes drift1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,35px) scale(1.12)}}
@keyframes drift2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-35px,-25px) scale(1.1)}}
@keyframes drift3{0%{transform:translate(0,0) scale(1)}100%{transform:translate(25px,-40px) scale(1.18)}}

/* Scanline ONLY for login */
.bg-scanline-login{position:fixed;top:0;left:0;right:0;height:2px;z-index:0;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(8,145,178,0.5),transparent);
  animation:scanline 8s linear infinite}
@keyframes scanline{0%{top:-2px}100%{top:100vh}}

/* ── SHELL ── */
.shell{display:flex;height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{
  width:248px;min-width:248px;height:100vh;
  background:var(--glass2);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--border3);
  box-shadow:2px 0 16px rgba(15,23,42,0.05);
  display:flex;flex-direction:column;
  position:relative;z-index:10;
  transition:width 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--indigo2),var(--cyan2),transparent);opacity:0.5}
.sidebar.mini{width:66px;min-width:66px}

.sbar-logo{padding:18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border4);min-height:70px}
.logo-gem{
  width:38px;height:38px;min-width:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--indigo),var(--cyan2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff-display);font-size:13px;font-weight:700;color:#fff;letter-spacing:0.05em;
  box-shadow:0 0 16px rgba(99,102,241,0.35),0 2px 8px rgba(15,23,42,0.15);
  position:relative;overflow:hidden;
}
.logo-gem::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.25),transparent)}
.logo-name{font-family:var(--ff-display);font-weight:700;font-size:13.5px;letter-spacing:0.04em;color:var(--txt);white-space:nowrap}
.logo-tag{font-family:var(--ff-mono);font-size:9px;color:var(--cyan);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;margin-top:1px}

.sbar-nav{flex:1;padding:10px 8px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.sbar-nav::-webkit-scrollbar{display:none}
.nav-grp{margin-bottom:18px}
.nav-grp-lbl{font-family:var(--ff-mono);font-size:9px;letter-spacing:0.15em;color:var(--txt4);padding:0 8px 7px;white-space:nowrap;text-transform:uppercase}

.ni{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--rs);
  cursor:pointer;transition:all 0.18s;margin-bottom:2px;
  border:1px solid transparent;white-space:nowrap;overflow:hidden;
  position:relative;color:var(--txt3);
}
.ni:hover{background:var(--bg3);border-color:var(--border4);color:var(--txt2)}
.ni.on{
  background:linear-gradient(135deg,rgba(79,70,229,0.1),rgba(8,145,178,0.08));
  border-color:rgba(79,70,229,0.2);
  color:var(--indigo);
  box-shadow:0 0 12px rgba(99,102,241,0.12);
}
.ni.on::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;border-radius:2px;background:linear-gradient(to bottom,var(--indigo),var(--cyan));box-shadow:0 0 8px rgba(99,102,241,0.5)}
.ni-ic{width:17px;height:17px;min-width:17px;display:flex;align-items:center;justify-content:center}
.ni-txt{font-size:13px;font-weight:500}
.ni-bdg{margin-left:auto;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;font-family:var(--ff-mono)}

.sbar-foot{padding:10px 8px;border-top:1px solid var(--border4)}
.u-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);background:var(--bg4);cursor:pointer;transition:all 0.2s;overflow:hidden;border:1px solid var(--border4)}
.u-card:hover{background:var(--bg5);box-shadow:0 0 12px rgba(99,102,241,0.12),0 2px 8px rgba(15,23,42,0.06)}
.av{width:32px;height:32px;min-width:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--ff-display);letter-spacing:0.05em;color:#fff}
.av-a{background:linear-gradient(135deg,#4338ca,#6366f1);box-shadow:0 0 10px rgba(99,102,241,0.4)}
.av-p{background:linear-gradient(135deg,#0e7490,#06b6d4);box-shadow:0 0 10px rgba(6,182,212,0.4)}
.av-s{background:linear-gradient(135deg,#047857,#10b981);box-shadow:0 0 10px rgba(16,185,129,0.4)}
.u-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.u-role{font-family:var(--ff-mono);font-size:9px;color:var(--indigo);letter-spacing:0.08em;text-transform:uppercase}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:26px 28px;background:var(--bg)}
.main::-webkit-scrollbar{width:3px}
.main::-webkit-scrollbar-thumb{background:rgba(79,70,229,0.2);border-radius:2px}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px}
.ph-title{font-family:var(--ff-display);font-size:20px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;color:var(--txt)}
.ph-sub{font-family:var(--ff-mono);font-size:10.5px;color:var(--txt4);letter-spacing:0.06em}
.ph-actions{display:flex;align-items:center;gap:8px}

/* ── CARDS ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border3);
  border-radius:var(--r);
  padding:20px 22px;
  box-shadow:var(--sh);
  position:relative;overflow:hidden;
  transition:border-color 0.25s,box-shadow 0.25s;
}
.card:hover{border-color:rgba(79,70,229,0.2);box-shadow:var(--sh-neon-i)}

/* ── STAT CARDS ── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:14px;margin-bottom:20px}
.sc{
  background:var(--bg2);
  border:1px solid var(--border3);
  border-radius:var(--r);
  padding:18px 20px;
  box-shadow:var(--sh);
  transition:all 0.25s;position:relative;overflow:hidden;
}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:0.15;border-radius:var(--r) var(--r) 0 0}
.sc:hover{transform:translateY(-2px)}
.sc.c{color:var(--cyan);border-color:rgba(8,145,178,0.2)}
.sc.c:hover{box-shadow:var(--sh-neon-c)}
.sc.g{color:var(--green);border-color:rgba(5,150,105,0.2)}
.sc.g:hover{box-shadow:0 0 0 1px rgba(5,150,105,0.2),0 4px 20px rgba(5,150,105,0.12)}
.sc.a{color:var(--amber);border-color:rgba(217,119,6,0.2)}
.sc.r{color:var(--red);border-color:rgba(220,38,38,0.2)}
.sc.i{color:var(--indigo);border-color:rgba(79,70,229,0.2)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.sc-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,0.8);border:1px solid rgba(15,23,42,0.08);box-shadow:0 1px 4px rgba(15,23,42,0.06)}
.sc-trend{font-family:var(--ff-mono);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.tu{background:rgba(5,150,105,0.1);color:var(--green)}
.td{background:var(--red2);color:var(--red)}
.sc-val{font-family:var(--ff-display);font-size:28px;font-weight:700;line-height:1;color:var(--txt)}
.sc-lbl{font-family:var(--ff-mono);font-size:10px;color:var(--txt4);margin-top:6px;letter-spacing:0.05em;text-transform:uppercase}

/* ── TABLE ── */
.dt{width:100%;border-collapse:collapse}
.dt th{text-align:left;padding:9px 13px;font-family:var(--ff-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--txt4);border-bottom:1px solid var(--border4);font-weight:500}
.dt td{padding:12px 13px;font-size:13px;border-bottom:1px solid var(--border4);transition:all 0.15s;vertical-align:middle}
.dt tr:last-child td{border-bottom:none}
.dt tbody tr:hover td{background:rgba(79,70,229,0.03)}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-family:var(--ff-mono);font-size:10px;font-weight:500;letter-spacing:0.04em;white-space:nowrap}
.bdg::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.bg{background:var(--green2);color:var(--green);border:1px solid rgba(5,150,105,0.2)}
.ba{background:var(--amber2);color:var(--amber);border:1px solid rgba(217,119,6,0.2)}
.br{background:var(--red2);color:var(--red);border:1px solid rgba(220,38,38,0.2)}
.bb{background:var(--indigo3);color:var(--indigo);border:1px solid rgba(79,70,229,0.2)}
.bc{background:var(--cyan3);color:var(--cyan);border:1px solid rgba(8,145,178,0.2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--rs);font-family:var(--ff-body);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;outline:none;text-decoration:none;letter-spacing:0.01em}
.b-cyan{background:var(--cyan3);color:var(--cyan);border:1px solid rgba(8,145,178,0.25)}
.b-cyan:hover{background:rgba(8,145,178,0.15);box-shadow:var(--sh-neon-c)}
.b-indigo{background:linear-gradient(135deg,var(--indigo),#6366f1);color:#fff;box-shadow:0 2px 10px rgba(79,70,229,0.35),0 0 20px rgba(99,102,241,0.15)}
.b-indigo:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(79,70,229,0.45),0 0 30px rgba(99,102,241,0.2)}
.b-ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--border3)}
.b-ghost:hover{background:var(--bg4);border-color:var(--border2)}
.b-danger{background:var(--red2);color:var(--red);border:1px solid rgba(220,38,38,0.2)}
.b-danger:hover{background:rgba(220,38,38,0.15)}
.b-sm{padding:5px 11px;font-size:11.5px}
.b-icon{padding:7px;width:32px;height:32px;justify-content:center}

/* ── FORMS ── */
.fg{margin-bottom:15px}
.fl{display:block;font-family:var(--ff-mono);font-size:9.5px;font-weight:500;color:var(--txt4);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.08em}
.fl .req{color:var(--red);margin-left:2px}
.fi,.fsel,.fta{width:100%;padding:9px 13px;background:var(--bg3);border:1px solid var(--border3);border-radius:var(--rs);color:var(--txt);font-family:var(--ff-body);font-size:13.5px;outline:none;transition:all 0.2s;-webkit-appearance:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--indigo);background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,0.1),0 0 12px rgba(99,102,241,0.1)}
.fi::placeholder,.fta::placeholder{color:var(--txt4)}
.fta{resize:vertical;min-height:88px}
.fsel option{background:#fff;color:var(--txt)}
.fi-err{border-color:rgba(220,38,38,0.5)!important}
.ferr{font-family:var(--ff-mono);font-size:10px;color:var(--red);margin-top:4px}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.login-box{
  width:100%;max-width:400px;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(40px);
  border:1px solid var(--border3);
  border-radius:22px;padding:38px 36px;
  box-shadow:0 0 0 1px rgba(79,70,229,0.08),0 20px 60px rgba(15,23,42,0.12),0 0 40px rgba(99,102,241,0.08);
  position:relative;overflow:hidden;
  animation:login-in 0.5s cubic-bezier(0.34,1.56,0.64,1)
}
@keyframes login-in{from{opacity:0;transform:translateY(30px) scale(0.96)}to{opacity:1;transform:none}}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--indigo),var(--cyan2),transparent);opacity:0.8}
.login-box::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:60px;background:radial-gradient(ellipse,rgba(99,102,241,0.08),transparent 70%);pointer-events:none}
.l-logo{text-align:center;margin-bottom:30px}
.l-gem{width:52px;height:52px;margin:0 auto 12px;border-radius:14px;background:linear-gradient(135deg,var(--indigo),var(--cyan2));display:flex;align-items:center;justify-content:center;font-family:var(--ff-display);font-size:12px;font-weight:700;color:#fff;letter-spacing:0.05em;box-shadow:0 0 24px rgba(99,102,241,0.4),0 0 48px rgba(6,182,212,0.15),0 4px 16px rgba(15,23,42,0.15)}
.l-name{font-family:var(--ff-display);font-size:22px;font-weight:800;letter-spacing:0.06em;margin-bottom:4px;color:var(--txt)}
.l-sub{font-family:var(--ff-mono);font-size:10px;color:var(--txt4);letter-spacing:0.1em;text-transform:uppercase}
.l-err{background:var(--red2);border:1px solid rgba(220,38,38,0.3);border-radius:var(--rs);padding:10px 13px;color:var(--red);font-size:12.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-family:var(--ff-mono)}
.l-btn{width:100%;justify-content:center;margin-top:6px;padding:11px 16px;font-size:14px;
  background:linear-gradient(135deg,var(--indigo),var(--cyan2));color:#fff;
  box-shadow:0 0 20px rgba(99,102,241,0.3),0 4px 16px rgba(79,70,229,0.3),0 0 40px rgba(6,182,212,0.1);letter-spacing:0.04em}
.l-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 30px rgba(99,102,241,0.45),0 6px 24px rgba(79,70,229,0.4),0 0 60px rgba(6,182,212,0.15)}
.l-btn:disabled{opacity:0.6;cursor:not-allowed}
.l-hint{text-align:center;margin-top:14px;font-family:var(--ff-mono);font-size:9.5px;color:var(--txt4);letter-spacing:0.05em}
.l-hint span{color:var(--indigo);margin:0 6px}

/* ── PAGE ANIMATIONS ── */
@keyframes pg-in{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.pg-anim{animation:pg-in 0.3s ease}

/* ── CHATBOT ── */
.cb-fab{position:fixed;bottom:26px;right:26px;z-index:100;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--cyan2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(99,102,241,0.45),0 0 40px rgba(99,102,241,0.2),0 4px 16px rgba(15,23,42,0.15);transition:all 0.3s;animation:fab-pulse 3s ease-in-out infinite}
@keyframes fab-pulse{0%,100%{box-shadow:0 0 20px rgba(99,102,241,0.45),0 0 40px rgba(99,102,241,0.2)}50%{box-shadow:0 0 30px rgba(99,102,241,0.65),0 0 60px rgba(99,102,241,0.3),0 0 0 8px rgba(99,102,241,0.08)}}
.cb-fab:hover{transform:scale(1.1)}
.cb-win{position:fixed;bottom:88px;right:26px;z-index:100;width:350px;height:490px;background:rgba(255,255,255,0.98);backdrop-filter:blur(30px);border:1px solid var(--border3);border-radius:18px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(79,70,229,0.08),0 20px 60px rgba(15,23,42,0.12),0 0 40px rgba(99,102,241,0.1);transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);transform-origin:bottom right}
.cb-win.hide{opacity:0;transform:scale(0.85) translateY(20px);pointer-events:none}
.cb-win::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--indigo),var(--cyan2),transparent);opacity:0.7}
.cb-head{padding:14px 16px;border-bottom:1px solid var(--border4);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cb-ai-ic{width:34px;height:34px;min-width:34px;border-radius:9px;background:linear-gradient(135deg,var(--indigo),var(--cyan2));display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 0 12px rgba(99,102,241,0.35),0 0 24px rgba(6,182,212,0.1)}
.cb-ai-nm{font-family:var(--ff-display);font-weight:700;font-size:12.5px;letter-spacing:0.04em;color:var(--txt)}
.cb-ai-st{font-family:var(--ff-mono);font-size:9px;color:var(--green);display:flex;align-items:center;gap:4px;letter-spacing:0.08em;text-transform:uppercase}
.cb-ai-st::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s ease-in-out infinite;flex-shrink:0;box-shadow:0 0 6px var(--green)}

const handleAISubmit=async(query)=>{
  try {
    const res = await axios.post('/ai/query', { query });
    return res.data.answer;
  } catch(e) {
    console.error('Erreur IA:', e);
    const errorMsg = e.response?.data?.error || 'Erreur assistant IA';
    return `⚠️ **Erreur** : ${errorMsg}`;
  }
};

function Chatbot(){
  const[open,setOpen]=useState(false);
  const[msgs,setMsgs]=useState([{role:'ai',text:'Bonjour ! Posez-moi vos questions sur les présences, absences ou statistiques de classe.'}]);
  const[inp,setInp]=useState('');
  const[typing,setTyping]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs,typing]);
  const send=async(text)=>{
    const msg=text||inp;
    if(!msg.trim())return;
    setInp('');
    setMsgs(p=>[...p,{role:'user',text:msg}]);
    setTyping(true);
    let apiAns=null;
    try{apiAns=await handleAISubmit(msg);}catch(_){}
    await new Promise(r=>setTimeout(r,1100));
    if(!apiAns){
      const l=msg.toLowerCase();
      apiAns=l.includes('absence')||l.includes('absent')?AI_RESP.absence:
              l.includes('présence')||l.includes('taux')?AI_RESP.présence:
              l.includes('justif')||l.includes('attente')?AI_RESP.justificatif:
              AI_RESP.default;
    }
    setTyping(false);
    setMsgs(p=>[...p,{role:'ai',text:apiAns}]);
  };
  const sugg=['Qui a +3 absences ?','Taux présence 3IIR-A','Justificatifs en attente','Compare les filières'];
  return(
    <>
      <div className={`cb-win${open?'':' hide'}`}>
        <div className="cb-head">
          <div className="cb-ai-ic">🤖</div>
          <div style={{flex:1}}>
            <div className="cb-ai-nm">ASSISTANT IA</div>
            <div className="cb-ai-st">En ligne · /api/ai/query</div>
          </div>
          <button className="mo-close" style={{position:'static'}} onClick={()=>setOpen(false)}>×</button>
        </div>
        <div className="cb-msgs">
          {msgs.map((m,i)=>(
            <div key={i} className={`cb-m ${m.role}`}>
              {m.role==='ai'&&<div style={{width:26,height:26,minWidth:26,background:'linear-gradient(135deg,var(--indigo),var(--cyan2))',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0,boxShadow:'0 0 8px rgba(99,102,241,0.3)'}}>🤖</div>}
              <div className="cb-bub" dangerouslySetInnerHTML={{__html:m.text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}/>
            </div>
          ))}
          {typing&&<div className="cb-m ai"><div style={{width:26,height:26,minWidth:26,background:'linear-gradient(135deg,var(--indigo),var(--cyan2))',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,boxShadow:'0 0 8px rgba(99,102,241,0.3)'}}>🤖</div><div className="cb-bub"><div className="dots"><div className="dot"/><div className="dot"/><div className="dot"/></div></div></div>}
          <div ref={endRef}/>
        </div>
        <div className="cb-sugg">{sugg.map(s=><button key={s} className="cb-s" onClick={()=>send(s)}>{s}</button>)}</div>
        <div className="cb-inp">
          <input className="cb-fi" placeholder="Posez votre question..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
          <button className="cb-send" onClick={()=>send()}><I n="send" s={13}/></button>
        </div>
      </div>
      <button className="cb-fab" onClick={()=>setOpen(!open)} title="Assistant IA">🤖</button>
    </>
  );
}

function StudentsPage(){
  const [list, setList] = useState([]);

  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({name:'',class:'3IIR-A',card_id:'',fingerprint_id:''});
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    axios.get('/students').then(r => setList(r.data)).catch(() => {});
  }, []);

  const filtered = list.filter(s =>
    s.name.toLowerCase().includes(q.toLowerCase()) || s.class?.includes(q)
  );

  const openNew = () => { setEditing(null); setForm({name:'',class:'3IIR-A',card_id:'',fingerprint_id:''}); setModal(true); };
  const openEdit = s => { setEditing(s); setForm({name:s.name,class:s.class,card_id:s.card_id,fingerprint_id:s.fingerprint_id||''}); setModal(true); };

  const save = async () => {
    setLoading(true);
    try {
      if (editing) {
        const r = await axios.put(`/students/${editing.id}`, form);
        setList(p => p.map(s => s.id === editing.id ? r.data : s));
      } else {
        const r = await axios.post('/students', form);
        setList(p => [...p, r.data]);
      }
      setModal(false);
    } catch(e) {
      alert(e.response?.data?.message || 'Erreur');
    } finally { setLoading(false); }
  };

  const del = async id => {
    if (!confirm('Supprimer cet étudiant ?')) return;
    await axios.delete(`/students/${id}`);
    setList(p => p.filter(s => s.id !== id));
  };
  return(
    <div className="pg-anim">
      <div className="topbar">
        <div className="search-b"><I n="srch" s={14}/><input placeholder="Rechercher un étudiant..." value={q} onChange={e=>setQ(e.target.value)}/></div>

            {filtered.map(s=>(
              <tr key={s.id}>
                <td><div style={{display:'flex',alignItems:'center',gap:8}}><Av name={s.name} role="student" size={30}/><span style={{fontWeight:600}}>{s.name}</span></div></td>
                <td style={{fontFamily:'var(--ff-mono)',fontSize:12,color:'var(--txt3)'}}>{s.card_id}</td>
                <td><span className="chip">{s.class}</span></td>
                <td><span style={{fontFamily:'var(--ff-mono)',color:s.absences>7?'var(--red)':s.absences>3?'var(--amber)':'var(--green)',fontWeight:600}}>{s.absences}</span></td>
                <td><span className={`bdg ${s.status==='Critique'?'br':s.status==='Avertissement'?'ba':'bg'}`}>{s.status}</span></td>
                <td style={{textAlign:'right'}}>
                  <div style={{display:'flex',gap:5,justifyContent:'flex-end'}}>
                    <button className="btn b-ghost b-icon b-sm" onClick={()=>openEdit(s)}><I n="edit" s={13}/></button>

function SoumettreJustif(){
  const[form,setForm]=useState({absence:'',reason:'',file:null});
  const[err,setErr]=useState('');
  const[drag,setDrag]=useState(false);
  const[done,setDone]=useState(false);
  const[loading,setLoading]=useState(false);
  const [absences, setAbsences] = useState([]);

  useEffect(() => {
    axios.get('/my-profile').then(r => {
      const all = r.data.attendances || [];
      setAbsences(all.filter(a => a.status === 'absent'));
    }).catch(() => {});
  }, []);

  const submit = async () => {
  if (!form.reason.trim()) { setErr('Le message est obligatoire.'); return; }
  setErr(''); setLoading(true);
  try {
    const fd = new FormData();
    fd.append('message', form.reason);
    fd.append('absence_id', form.absence); // added absence_id
    if (form.file) fd.append('file', form.file);
    await axios.post(`/my-justifications`, fd, {
      headers: { 'Content-Type': 'multipart/form-data' }
    });
    setDone(true);
  } catch(e) {
    setErr(e.response?.data?.message || 'Erreur lors de l\'envoi.');
  } finally { setLoading(false); }
};
  if(done)return(
    <div className="pg-anim">
      <div className="card" style={{textAlign:'center',padding:'52px 36px',maxWidth:480}}>
        <div style={{fontSize:52,marginBottom:14}}>✅</div>
        <div className="st" style={{fontSize:18,marginBottom:8}}>Justificatif soumis !</div>
        <div style={{fontFamily:'var(--ff-mono)',fontSize:11,color:'var(--txt4)',marginBottom:24,letterSpacing:'0.04em'}}>En attente de validation par votre professeur</div>
        <button className="btn b-ghost" onClick={()=>{setDone(false);setForm({absence:'',reason:'',file:null});}}>Soumettre un autre</button>
      </div>
    </div>
  );
  return(
    <div className="pg-anim">
      <div className="card" style={{maxWidth:540}}>
        <div className="mo-title" style={{marginBottom:20}}>Nouveau justificatif</div>
        {err&&<div className="l-err" style={{marginBottom:16}}>⚠ {err}</div>}
        <div className="fg"><label className="fl">Absence concernée<span className="req">*</span></label><select className="fsel" value={form.absence} onChange={e=>setForm({...form,absence:e.target.value})}><option value="">— Sélectionner une absence —</option>{absences.map(a=><option key={a.id} value={a.id}>{a.date} — {a.time}</option>)}</select></div>
        <div className="fg">
          <label className="fl">Motif / Message<span className="req">*</span></label>
          <textarea className={`fta${!form.reason&&err?` fi-err`:''}`} placeholder="Décrivez en détail la raison de votre absence..." value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})}/>
          {!form.reason&&err&&<div className="ferr">Ce champ est obligatoire</div>}
        </div>
        <div className="fg">
          <label className="fl">Pièce justificative <span style={{color:'var(--txt4)',fontWeight:400,marginLeft:3}}>(optionnelle)</span></label>
          <div className={`upz${drag?' dov':''}`} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)setForm({...form,file:f});}} onClick={()=>document.getElementById('fi-up').click()}>
            <div className="upz-icon"><I n="up" s={28}/></div>
            <div className="upz-t">{form.file?`📎 ${form.file.name}`:'Glissez votre fichier ici'}</div>
            <div className="upz-s">PDF, JPG, PNG · max 10 Mo · champ optionnel</div>
            <input id="fi-up" type="file" accept=".pdf,.jpg,.png" style={{display:'none'}} onChange={e=>setForm({...form,file:e.target.files[0]})}/>
          </div>
        </div>
        <button className="btn b-indigo" style={{width:'100%',justifyContent:'center',padding:'11px',marginTop:4}} onClick={submit} disabled={loading}>
          {loading?'⟳  Envoi en cours...':'📤  Soumettre le justificatif'}
        </button>
        <div style={{textAlign:'center',marginTop:10,fontFamily:'var(--ff-mono)',fontSize:9.5,color:'var(--txt4)',letterSpacing:'0.04em'}}>POST /api/my-justifications — multipart/form-data</div>
      </div>
    </div>
  );
}

            {ABSENCES_STU.map(a=>(
              <tr key={a.id}>
                <td style={{fontWeight:600}}>Ayoub Mansouri</td>
                <td style={{fontFamily:'var(--ff-mono)',fontSize:11.5,color:'var(--txt3)'}}>{a.date}</td>
                <td style={{fontWeight:500}}>{a.matiere}</td>
                <td style={{fontFamily:'var(--ff-mono)',fontSize:11.5}}>{a.duree}</td>
                <td><span className={`bdg ${a.justifie?'bg':'br'}`}>{a.justifie?'Oui':'Non'}</span></td>
                <td><span className={`bdg ${a.statut==='Validé'?'bg':a.statut==='En attente'?'ba':'br'}`}>{a.statut}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function MesAbsences(){
  return(
    <div className="pg-anim">
      <div className="card">
        <div className="sh"><div className="st">Historique de mes absences</div></div>
        <table className="dt">
          <thead><tr><th>Date</th><th>Matière</th><th>Professeur</th><th>Durée</th><th>Justifié</th><th>Statut</th></tr></thead>
          <tbody>
            {ABSENCES_STU.map(a=>(
              <tr key={a.id}>
                <td style={{fontFamily:'var(--ff-mono)',fontSize:11.5,color:'var(--txt3)'}}>{a.date}</td>
                <td style={{fontWeight:600}}>{a.matiere}</td>
                <td style={{color:'var(--txt3)',fontSize:12.5}}>{a.prof}</td>
                <td style={{fontFamily:'var(--ff-mono)',fontSize:11.5}}>{a.duree}</td>
                <td><span className={`bdg ${a.justifie?'bg':'br'}`}>{a.justifie?'Oui':'Non'}</span></td>
                <td><span className={`bdg ${a.statut==='Validé'?'bg':a.statut==='En attente'?'ba':'br'}`}>{a.statut}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App(){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('sng_user'));}catch{return null;}});
  const[page,setPage]=useState('dashboard');
  const[mini,setMini]=useState(false);
  const handleLogin=u=>{localStorage.setItem('sng_user',JSON.stringify(u));localStorage.setItem('sng_token',u.token);setUser(u);setPage('dashboard');};
  const handleLogout=()=>{localStorage.removeItem('sng_user');localStorage.removeItem('sng_token');setUser(null);};
  const PAGE_TITLES={
    dashboard:user?.role==='student'?'Mon dashboard':'Vue d\'ensemble',
    students:'Gestion des étudiants',
    'absences-admin':'Absences',
    'justificatifs-admin':'Validation justificatifs',
    'scan-live':'Scan en temps réel',
    stats:'Statistiques',
    'students-prof':'Liste des étudiants',
    'justificatifs-prof':'Validation justificatifs',
    chatbot:'Assistant IA',
    'mes-absences':'Mes absences',
    soumettre:'Soumettre un justificatif',
    config:'Configuration système',
  };
  const renderPage=()=>{
    if(!user)return null;
    if(user.role==='admin')switch(page){
      case 'dashboard':return<AdminDash/>;
      case 'students':return<StudentsPage/>;
      case 'absences-admin':return<AbsencesAdmin/>;
      case 'justificatifs-admin':return<JustificatifsAdmin/>;
      case 'config':return<ConfigPage/>;
      default:return<AdminDash/>;
    }
    if(user.role==='professor')switch(page){
      case 'dashboard':return<ProfDash/>;
      case 'scan-live':return<ScanLive/>;
      case 'students-prof':return<StudentsProfPage/>;
      case 'justificatifs-prof':return<JustificatifsAdmin/>;
      case 'chatbot':return<ChatbotPage/>;
      default:return<ProfDash/>;
    }
    if(user.role==='student')switch(page){
      case 'dashboard':return<StudentDash/>;
      case 'mes-absences':return<MesAbsences/>;
      case 'soumettre':return<SoumettreJustif/>;
      default:return<StudentDash/>;
    }
  };
  const now=new Date();
  const dateStr=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if(!user)return(
    <>
      <div className="bg-wrap"><div className="bg-orb orb1"/><div className="bg-orb orb2"/><div className="bg-orb orb3"/></div>
      <div className="bg-scanline-login"/>
      <LoginPage onLogin={handleLogin}/>
    </>
  );
  return(
    <>
      <div className="bg-wrap"><div className="bg-orb orb1"/><div className="bg-orb orb2"/><div className="bg-orb orb3"/></div>
      <div className="shell">
        <Sidebar user={user} page={page} setPage={setPage} onLogout={handleLogout} mini={mini} setMini={setMini}/>
        <div className="main">
          <div className="ph">
            <div>
              <div className="ph-title">{PAGE_TITLES[page]||'Dashboard'}</div>
              <div className="ph-sub">{dateStr.toUpperCase()} · SEMESTRE 1 — 2024/2025</div>
            </div>
            <div className="ph-actions">
              <button className="btn b-ghost b-sm" onClick={()=>setMini(!mini)} title="Réduire sidebar"><I n="menu" s={14}/></button>
            </div>
          </div>
          {renderPage()}
        </div>
      </div>
      {user.role==='professor'&&<Chatbot/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
